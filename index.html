/* ─── VALIDAÇÕES ─── */
function validCPF(s){
  const d=s.replace(/\D/g,"");
  if(d.length!==11||/^(\d)\1+$/.test(d))return false;
  let s1=0,s2=0;
  for(let i=0;i<9;i++)s1+=+d[i]*(10-i);
  let r1=(s1*10)%11;if(r1>=10)r1=0;if(r1!==+d[9])return false;
  for(let i=0;i<10;i++)s2+=+d[i]*(11-i);
  let r2=(s2*10)%11;if(r2>=10)r2=0;return r2===+d[10];
}
function maskCPF(v){return v.replace(/\D/g,"").slice(0,11).replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d{1,2})$/,"$1-$2");}
function maskPhone(v){return v.replace(/\D/g,"").slice(0,11).replace(/(\d{2})(\d)/,"($1) $2").replace(/(\d{5})(\d)/,"$1-$2");}

  const n=19;
  return(
    <svg width={size} height={size} viewBox={`0 0 ${n} ${n}`} style={{display:"block",borderRadius:4}}>
      <rect width={n} height={n} fill="white"/>
      {bits.split("").map((c,i)=>c==="1"?<rect key={i} x={i%n} y={Math.floor(i/n)} width={1} height={1} fill="#111111"/>:null)}
    </svg>
  );
}

function makeCaptcha(){
  const a=Math.floor(Math.random()*9)+1;
  const b=Math.floor(Math.random()*9)+1;
  return {a,b,ans:a+b};
}
function AuthScreen({onLogin}){
  const [tab,setTab]=useState("login");
  const [loginEmail,setLoginEmail]=useState("");
  const [loginPass,setLoginPass]=useState("");
  const [loginErr,setLoginErr]=useState("");
  const [loginLoading,setLoginLoading]=useState(false);
  const [rName,setRName]=useState("");
  const [rEmail,setREmail]=useState("");
  const [rCPF,setRCPF]=useState("");
  const [rPhone,setRPhone]=useState("");
  const [rPass,setRPass]=useState("");
  const [rPass2,setRPass2]=useState("");
  const [rTC,setRTC]=useState(false);
  const [rErr,setRErr]=useState("");
  const [rLoading,setRLoading]=useState(false);
  const [fEmail,setFEmail]=useState("");
  const [fSent,setFSent]=useState(false);
  const [captcha,setCaptcha]=useState(()=>makeCaptcha());
  const [captchaVal,setCaptchaVal]=useState("");
  const [captchaErr,setCaptchaErr]=useState(false);
  const refreshCaptcha=()=>{setCaptcha(makeCaptcha());setCaptchaVal("");setCaptchaErr(false);};

  const doLogin=async()=>{
    if(!loginEmail){setLoginErr("Informe seu e-mail.");return;}
    if(!loginPass){setLoginErr("Informe sua senha.");return;}
    if(parseInt(captchaVal)!==captcha.ans){setCaptchaErr(true);refreshCaptcha();return;}
    setLoginLoading(true);setLoginErr("");setCaptchaErr(false);
    const {user,error}=await SbAuth.login(loginEmail,loginPass);
    setLoginLoading(false);
    if(error){
      const raw=typeof error.message==="string"?error.message:JSON.stringify(error);
      const msg=raw.includes("Email not confirmed")||raw.includes("email_not_confirmed")
        ?"📧 E-mail ainda não confirmado. Verifique sua caixa de entrada e clique no link que enviamos."
        :raw.includes("Invalid login")||raw.includes("invalid_grant")||raw.includes("Invalid email or password")
        ?"E-mail ou senha incorretos."
        :raw||"Erro ao entrar. Tente novamente.";
      setLoginErr(msg);return;
    }
    if(user) onLogin({id:user.id,name:user.user_metadata?.name||loginEmail.split("@")[0],email:user.email,isNew:false});
  };
  const doRegister=async()=>{
    if(!rName||!rEmail||!rCPF||!rPhone||!rPass||!rPass2){setRErr("Preencha todos os campos.");return;}
    if(!validCPF(rCPF)){setRErr("CPF inválido.");return;}
    if(rPass!==rPass2){setRErr("As senhas não coincidem.");return;}
    if(rPass.length<8){setRErr("Senha precisa ter ao menos 8 caracteres.");return;}
    if(!rTC){setRErr("Aceite os termos para continuar.");return;}
    if(parseInt(captchaVal)!==captcha.ans){setCaptchaErr(true);refreshCaptcha();return;}
    setRLoading(true);setRErr("");setCaptchaErr(false);
    try {
      const {user,session,error}=await SbAuth.register(rEmail,rPass,rName,rCPF,rPhone);
      setRLoading(false);
      if(error){
        const raw=typeof error.message==="string"?error.message:JSON.stringify(error);
        const msg=raw.includes("already registered")||raw.includes("already been registered")||raw.includes("user_already_exists")
          ?"Este e-mail já está cadastrado. Tente fazer login."
          :raw.includes("Password should")||raw.includes("weak")
          ?"Senha muito fraca. Use letras, números e símbolos."
          :raw||"Erro ao criar conta. Tente novamente.";
        setRErr(msg);return;
      }
      if(user && session){
        // Confirmação desativada — entra direto
        onLogin({id:user.id,name:rName,email:rEmail,isNew:true});
      } else if(user && !session){
        // Confirmação ativada — aguarda e-mail
        setRErr("✅ Cadastro realizado! Verifique seu e-mail para confirmar a conta antes de entrar.");
      } else {
        setRErr("✅ Cadastro realizado! Verifique seu e-mail para confirmar a conta antes de entrar.");
      }
    } catch(e) {
      setRLoading(false);
      setRErr("Erro de conexão. Verifique sua internet e tente novamente.");
    }
  };
  const doForgotPassword=async()=>{
    if(!fEmail){return;}
    const {error}=await SbAuth.resetPassword(fEmail);
    if(!error) setFSent(true);
  };

  const inp="inp-dark";

  return(
    <div className="screen flex flex-col bg-ink text-white px-6 pt-14 pb-8 fade-in overflow-hidden relative">
      <div className="relative z-10 mb-5">
        <div className="w-14 h-14 rounded-2xl bg-[#001A4D] border border-[#002266] flex items-center justify-center text-2xl font-bold mb-4">⚡</div>
        <h1 className="text-3xl font-extrabold leading-tight tracking-tight">EletroGo</h1>
        <p className="text-gray-400 text-xs mt-1">Rede de Eletropostos · Curitiba, PR</p>
      </div>

      <div className="relative z-10 flex bg-white/5 rounded-2xl p-1 mb-5">
        {["login","register"].map(t=>(
          <button key={t} onClick={()=>{setTab(t);setLoginErr("");setRErr("");}}
            className={"flex-1 py-2 rounded-xl text-sm font-bold transition "+(tab===t?"bg-[#FF5C00] text-white shadow":"text-gray-400")}>
            {t==="login"?"Entrar":"Criar conta"}
          </button>
        ))}
      </div>

      {tab==="forgot"&&(
        <div className="relative z-10 space-y-4 slide-up">
          <button onClick={()=>setTab("login")} className="text-[#FF5C00] text-sm font-semibold">← Voltar</button>
          <h2 className="text-lg font-extrabold">Redefinir senha</h2>
          {fSent?(
            <div className="bg-[#FF5C00]/20 border border-[#FF5C00]/20 rounded-2xl p-5 text-center">
              <p className="text-3xl mb-2">📧</p>
              <p className="font-bold text-[#FF5C00]">E-mail enviado!</p>
              <p className="text-sm text-gray-400 mt-1">Verifique <strong className="text-white">{fEmail}</strong> e siga as instruções.</p>
              <button onClick={()=>setTab("login")} className="mt-4 text-[#FF5C00] text-sm font-semibold">Voltar ao login</button>
            </div>
          ):(
            <>
              <p className="text-sm text-gray-400">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>
              <input value={fEmail} onChange={e=>setFEmail(e.target.value)} placeholder="voce@email.com" className={inp}/>
              <button onClick={doForgotPassword} className="w-full py-3.5 rounded-xl bg-gradient-to-r bg-[#FF5C00] font-bold text-white">Enviar link</button>
            </>
          )}
        </div>
      )}

      {tab==="login"&&(
        <div className="relative z-10 space-y-3 slide-up">
          <input value={loginEmail} onChange={e=>setLoginEmail(e.target.value)} placeholder="E-mail" className={inp}/>
          <input value={loginPass} onChange={e=>setLoginPass(e.target.value)} type="password" placeholder="Senha" className={inp}/>
          {/* Verificação humana */}
          <div style={{background:"#001A4D",border:`1.5px solid ${captchaErr?"#f87171":"#002266"}`,borderRadius:14,padding:"12px 14px"}} className="flex items-center gap-3">
            <div style={{width:36,height:36,borderRadius:10,background:"rgba(255,92,0,.1)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:16}}>🤖</div>
            <div className="flex-1">
              <p className="text-[11px] text-gray-400 font-semibold mb-1">Verificação rápida</p>
              <div className="flex items-center gap-2">
                <span className="text-white font-bold text-sm">{captcha.a} + {captcha.b} =</span>
                <input value={captchaVal} onChange={e=>{setCaptchaVal(e.target.value);setCaptchaErr(false);}}
                  type="number" placeholder="?" maxLength={2}
                  style={{width:52,background:"#002266",border:`1px solid ${captchaErr?"#f87171":"#003087"}`,borderRadius:8,padding:"4px 8px",color:"#fff",fontSize:14,fontWeight:700,outline:"none"}}/>
                <button onClick={refreshCaptcha} style={{fontSize:14,color:"#6b7280",background:"none",border:"none",cursor:"pointer",padding:"0 4px"}} title="Nova pergunta">↺</button>
              </div>
            </div>
            {captchaErr&&<span className="text-rose-400 text-[10px] font-bold">Incorreto</span>}
          </div>
          {loginErr&&<p className="text-rose-400 text-xs font-semibold">{loginErr}</p>}
          <button onClick={doLogin} disabled={loginLoading}
            className="w-full py-4 rounded-2xl font-extrabold bg-[#FF5C00] text-white shadow-lg shadow-black/30 disabled:opacity-60">
            {loginLoading?"Entrando...":"Entrar →"}
          </button>
          <button onClick={()=>{setTab("forgot");setFSent(false);setFEmail("");}} className="w-full text-center text-xs text-gray-400 font-semibold pt-1">
            Esqueci minha senha
          </button>
        </div>
      )}

      {tab==="register"&&(
        <div className="relative z-10 space-y-2.5 slide-up">
          <input value={rName} onChange={e=>setRName(e.target.value)} placeholder="Nome completo" className={inp}/>
          <input value={rEmail} onChange={e=>setREmail(e.target.value)} placeholder="E-mail" className={inp}/>

/* ─── Google Maps real ─── */
const GMAPS_DARK=[{elementType:"geometry",stylers:[{color:"#1a1f2e"}]},{elementType:"labels.text.stroke",stylers:[{color:"#001133"}]},{elementType:"labels.text.fill",stylers:[{color:"#6b7280"}]},{featureType:"road",elementType:"geometry",stylers:[{color:"#253047"}]},{featureType:"road.highway",elementType:"geometry",stylers:[{color:"#1e2f48"}]},{featureType:"water",elementType:"geometry",stylers:[{color:"#0a111f"}]},{featureType:"poi",elementType:"labels",stylers:[{visibility:"off"}]},{featureType:"transit",stylers:[{visibility:"off"}]}];

function GoogleMapComponent({stations,onSelect}){
  const mapRef=useRef(null);
  const mapsLoaded=useGoogleMaps();
  const [userPos,setUserPos]=useState(null);
  const [geoStatus,setGeoStatus]=useState("idle"); // idle | loading | ok | denied

  // Get geolocation once
  useEffect(()=>{
    if(!navigator.geolocation){return;}
    setGeoStatus("loading");
    navigator.geolocation.getCurrentPosition(
      pos=>{setUserPos({lat:pos.coords.latitude,lng:pos.coords.longitude});setGeoStatus("ok");},
      ()=>{setGeoStatus("denied");},
      {timeout:8000,maximumAge:60000}
    );
  },[]);

  // Init map
  useEffect(()=>{
    if(!mapsLoaded||!mapRef.current)return;
    const center=userPos||CURITIBA_CENTER;
    const map=new window.google.maps.Map(mapRef.current,{
      center,zoom:13,disableDefaultUI:true,
      zoomControl:true,gestureHandling:"greedy",
      styles:GMAPS_DARK,
    });

    // Station markers
    stations.forEach(st=>{
      const coord=STATION_COORDS[st.id];
      if(!coord)return;
      const occ=st.connectors.some(c=>c.status==="disponivel");
      const color=occ?"#FF5C00":"#ff7a45";
      const marker=new window.google.maps.Marker({
        position:coord,map,title:st.name,
        icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:12,fillColor:color,fillOpacity:1,strokeColor:"#fff",strokeWeight:2.5},
      });
      marker.addListener("click",()=>onSelect(st));
    });

    // User location marker
    if(userPos){
      new window.google.maps.Marker({
        position:userPos,map,title:"Você está aqui",
        icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:8,fillColor:"#8b5cf6",fillOpacity:1,strokeColor:"#fff",strokeWeight:3},
      });
    }
  },[mapsLoaded,userPos]);

  if(!mapsLoaded){
    return <StaticMap stations={stations} onSelect={onSelect}/>;
  }

  return(
    <div className="relative mx-4 mt-4 overflow-hidden" style={{height:148,borderRadius:24,boxShadow:"0 2px 12px rgba(10,14,26,.1)"}}>
      <div ref={mapRef} style={{width:"100%",height:"100%"}}/>
      {geoStatus==="loading"&&(
        <div style={{position:"absolute",bottom:8,left:12,fontSize:10,background:"rgba(10,14,26,.75)",backdropFilter:"blur(8px)",borderRadius:99,padding:"4px 10px",color:"rgba(255,255,255,.7)",fontWeight:600}}>📡 Localizando…</div>
      )}
      {geoStatus==="ok"&&(
        <div style={{position:"absolute",bottom:8,left:12,fontSize:10,background:"rgba(10,14,26,.75)",backdropFilter:"blur(8px)",borderRadius:99,padding:"4px 10px",color:"#FF5C00",fontWeight:600}}>📍 Localização ativa</div>
      )}
      {geoStatus==="denied"&&(
        <div style={{position:"absolute",bottom:8,left:12,fontSize:10,background:"rgba(10,14,26,.75)",backdropFilter:"blur(8px)",borderRadius:99,padding:"4px 10px",color:"#ff7a45",fontWeight:600}}>📍 Curitiba, PR</div>
      )}
    </div>
  );
}

          <h2 className="text-xl font-bold mt-2 tracking-tight">{station.name}</h2>
          <p className="text-xs text-white/40 mt-1">{station.address}</p>

          </div>
        )}
        {isGold&&(
          <div className="bg-yellow-50 border border-yellow-200 rounded-2xl p-3 flex items-center gap-2">
            <span className="text-xl">👑</span>
            <div><p className="text-xs font-bold text-yellow-700">EletroPass Gold — Reserva disponível</p><p className="text-[11px] text-yellow-600">Reserve um conector por até 15 minutos.</p></div>
          </div>
        )}
        <div>
          <h3 className="text-sm font-bold text-white mb-2">Conectores disponíveis</h3>
          <div className="space-y-2">
            {station.connectors.map((c,ci)=>{
              const key=station.id+"-"+c.id;
              const res=reservations&&reservations[key];
              const minsLeft=res?Math.ceil(res.secsLeft/60):0;
              const ringColor=c.status==="disponivel"?"rgba(255,171,0,.3)":c.status==="manutencao"?"rgba(244,63,94,.3)":"rgba(255,122,69,.3)";
              const iconBg=c.status==="disponivel"?"linear-gradient(135deg,#FF5C00,#FFAB00)":c.status==="manutencao"?"linear-gradient(135deg,#f43f5e,#e11d48)":"linear-gradient(135deg,#ff7a45,#f4622a)";
              return(
                <div key={c.id} className="card p-4" style={{boxShadow:`0 0 0 3px ${ringColor}, 0 2px 10px rgba(10,14,26,.05)`}}>
                  <div className="flex items-center justify-between gap-3">
                    <div className="flex items-center gap-3 flex-1 min-w-0">
                      <div style={{width:44,height:44,borderRadius:14,background:iconBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,boxShadow:`0 4px 12px ${ringColor}`}}>🔌</div>
                      <div className="min-w-0">
                        <p className="font-extrabold text-white text-sm">{c.type}</p>
                        <div className="flex items-center gap-2 mt-0.5">
                          <Badge status={c.status}/>
                          <span className="text-[10px] text-gray-300">·</span>
                          <span className="text-[11px] font-bold text-gray-500">{c.powerKw} kW</span>
                        </div>
                        <p className="text-[11px] font-extrabold text-[#FFAB00] mt-1">{fmtMoney(c.priceKwh)} / kWh</p>
                      </div>
                    </div>
                    <div className="flex flex-col gap-1.5 items-end flex-shrink-0">
                      <button disabled={c.status!=="disponivel"} onClick={()=>onStartCharge(station,c)}
                        style={c.status==="disponivel"?{background:"linear-gradient(135deg,#FF5C00,#FFAB00)",color:"#ffffff",fontWeight:800,fontSize:13,padding:"10px 16px",borderRadius:14,border:"none",cursor:"pointer",boxShadow:"0 4px 14px rgba(255,92,0,.3)"}:{background:"#001133",color:"#d1d5db",fontWeight:700,fontSize:13,padding:"10px 16px",borderRadius:14,border:"none",cursor:"not-allowed"}}>
                        {c.status==="disponivel"?"⚡ Carregar":"—"}
                      </button>
                      {isGold&&c.status==="disponivel"&&!res&&(
                        <button onClick={()=>onReserve(station,c)} style={{fontSize:11,fontWeight:700,padding:"6px 12px",borderRadius:10,background:"#fef9c3",color:"#92400e",border:"1px solid #fde68a",cursor:"pointer"}}>⏱ Reservar</button>
                      )}
                      {res&&<span className="badge-pill bg-amber-50 text-amber-600" style={{border:"1px solid #fde68a"}}>⏳ {minsLeft} min</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════

function ChargingScreen({session,onStop,onBack,wallet}){
  if(!session){
    return(
      <div className="screen bg-[#001133] fade-in flex flex-col items-center justify-center px-6 text-center">
        <div className="w-20 h-20 rounded-3xl bg-gradient-to-br bg-[#001A4D] flex items-center justify-center text-4xl mb-4">⚡</div>
        <p className="font-bold text-white text-lg">Nenhuma carga em andamento</p>
        <p className="text-xs text-gray-400 mt-1 max-w-[220px]">Escolha um eletroposto na tela inicial para iniciar uma recarga.</p>
        <button onClick={onBack} className="mt-5 px-6 py-3 rounded-2xl bg-[#FF5C00] text-white text-sm font-bold shadow-lg shadow-black/30">Buscar eletropostos</button>
      </div>
    );
  }
  const {station,connector,kwh,elapsedSec}=session;
  const pct=Math.min(100,(kwh/40)*100);
  const coupon=wallet.coupons.find(c=>c.id===session.appliedCouponId);
  const rawCost=kwh*connector.priceKwh;
  let discountValue=0;
  if(coupon&&coupon.type==="percent")discountValue=rawCost*(coupon.value/100);
  const finalCost=Math.max(0,rawCost-discountValue);
  const mins=Math.floor(elapsedSec/60);
  const secs=elapsedSec%60;
  const r=84,circumference=2*Math.PI*r,offset=circumference-(pct/100)*circumference;
  return(
    <div className="screen bg-ink text-white fade-in flex flex-col overflow-hidden relative">
      <div className="relative z-10">
        <TopBar title="Carregando" onBack={onBack} dark right={<span className="text-[11px] bg-white/10 px-2.5 py-1 rounded-full font-semibold text-[#FF5C00]">● em andamento</span>}/>
      </div>
      <div className="flex-1 flex flex-col items-center justify-center px-6 -mt-4 relative z-10">
        <p className="text-sm text-gray-300 font-medium mb-1">{station.name}</p>
        <div className="relative w-56 h-56 flex items-center justify-center">
          <svg className="absolute inset-0" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r={r} stroke="#1c2438" strokeWidth="12" fill="none"/>
            <circle cx="100" cy="100" r={r} stroke="#FF5C00" strokeWidth="12" fill="none" strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" transform="rotate(-90 100 100)" className="progress-ring"/>
          </svg>
          <div className="text-center">
            <p className="text-4xl font-extrabold tracking-tight">{fmtKwh(kwh)}</p>
            <p className="text-xs text-[#FF5C00] mt-1 font-semibold">{connector.powerKw} kW · {connector.type}</p>
          </div>
        </div>
        <div className="mt-5 bg-white/5 border border-white/10 rounded-2xl px-5 py-3 flex items-center justify-between w-full">
          <div className="flex items-center gap-2 text-xs text-gray-300"><span className="text-[#FF5C00] font-bold">⚡</span><span>Tarifa</span></div>
          <div className="text-right"><span className="font-extrabold text-white">{fmtMoney(connector.priceKwh)}</span><span className="text-gray-400 text-xs"> / kWh</span></div>
        </div>
        <div className="grid grid-cols-3 gap-3 w-full mt-3">
          <div className="bg-white/5 border border-white/5 rounded-2xl p-3 text-center">
            <p className="text-[10px] text-gray-400 font-semibold uppercase">Tempo</p>
            <p className="font-bold mt-1">{String(mins).padStart(2,"0")}:{String(secs).padStart(2,"0")}</p>
          </div>
          <div className="bg-white/5 border border-white/5 rounded-2xl p-3 text-center">
            <p className="text-[10px] text-gray-400 font-semibold uppercase">Total</p>
            <p className="font-bold mt-1 text-[#FF5C00]">{fmtMoney(finalCost)}</p>
          </div>
          <div className="bg-white/5 border border-white/5 rounded-2xl p-3 text-center">
            <p className="text-[10px] text-gray-400 font-semibold uppercase">Economia</p>
            <p className="font-bold mt-1 text-[#FF5C00]">{discountValue>0?"-"+fmtMoney(discountValue):"—"}</p>
          </div>
        </div>
        {coupon&&<div className="mt-3 w-full glass rounded-2xl px-3 py-2.5 text-xs text-[#FF5C00] text-center font-semibold border border-[#FF5C00]/20">{coupon.icon} Cupom ativo: {coupon.big} — {coupon.title}</div>}
        {/* ETA + sessão */}
        <div className="mt-4 w-full glass rounded-2xl px-4 py-3 flex items-center justify-between">
          <div className="text-center">
            <p className="text-[10px] text-gray-400 font-semibold uppercase">Sessão</p>
            <p className="text-xs font-extrabold text-white mt-0.5">{session.id}</p>
          </div>
          <div className="w-px h-8 bg-white/10"></div>
          <div className="text-center">
            <p className="text-[10px] text-gray-400 font-semibold uppercase">Potência</p>
            <p className="text-xs font-extrabold text-[#FF5C00] mt-0.5">{connector.powerKw} kW</p>
          </div>
          <div className="w-px h-8 bg-white/10"></div>
          <div className="text-center">
            <p className="text-[10px] text-gray-400 font-semibold uppercase">ETA completo</p>
            <p className="text-xs font-extrabold text-white mt-0.5">
              {(()=>{
                const remaining=Math.max(0,40-kwh);
                const hrsLeft=remaining/connector.powerKw;
                const minsLeft=Math.round(hrsLeft*60);
                return minsLeft<60?`~${minsLeft} min`:`~${Math.floor(minsLeft/60)}h${minsLeft%60}m`;
              })()}
            </p>
          </div>
        </div>
      </div>
      <div className="px-6 pb-10 relative z-10 space-y-3">
        <button onClick={onStop} style={{width:"100%",padding:"16px",borderRadius:18,fontWeight:800,fontSize:15,background:"linear-gradient(135deg,#f43f5e,#e11d48)",boxShadow:"0 8px 24px rgba(244,63,94,.35)",border:"none",color:"#fff",cursor:"pointer"}}>⏹ Encerrar carga</button>
        <p className="text-center text-[10px] text-gray-600">Conector permanece bloqueado até confirmar pagamento</p>
      </div>
    </div>
  );
}

function PaymentScreen({completedSession,wallet,onConfirm,onBack}){
  const [method,setMethod]=useState(null);
  const [pixStatus,setPixStatus]=useState("idle");
  const [pixSecs,setPixSecs]=useState(1800);
  const [copied,setCopied]=useState(false);
  const [cardOpened,setCardOpened]=useState(false);
  const [cardErr,setCardErr]=useState(false);

  const {station,connector,kwh,elapsedSec,finalCost,discount}=completedSession;
  const durationMin=Math.max(1,Math.round(elapsedSec/60));
  const hasSaldo=wallet.balance>=finalCost;
  const hasSaldoParcial=wallet.balance>=1&&wallet.balance<finalCost;

  useEffect(()=>{
    if(method!=="pix"||pixStatus!=="idle")return;
    const t=setInterval(()=>setPixSecs(s=>{if(s<=1){clearInterval(t);setPixStatus("expired");return 0;}return s-1;}),1000);
    return()=>clearInterval(t);
  },[method,pixStatus]);

  useEffect(()=>{
    if(pixStatus!=="scanning")return;
    const t=setTimeout(()=>{setPixStatus("confirmed");setTimeout(()=>onConfirm("pix"),900);},3000);
    return()=>clearTimeout(t);
  },[pixStatus]);

  useEffect(()=>{
    if(!cardOpened)return;
    const t=setTimeout(()=>setCardErr(true),8000);
    return()=>clearTimeout(t);
  },[cardOpened]);

  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  const billSummary=(
    <div className="rounded-2xl overflow-hidden border border-[#002266] mb-4">
      <div className="bg-[#001A4D] px-4 py-3 flex items-center gap-3">
        <div className="w-9 h-9 rounded-full bg-[#FF5C00]/10 border border-[#FF5C00]/20 flex items-center justify-center text-lg">⚡</div>
        <div><p className="font-bold text-white text-sm">Recarga concluída</p><p className="text-[11px] text-white/40">{station.name} · {connector.type}</p></div>
        <div className="ml-auto text-right"><p className="text-[10px] text-white/40 font-semibold">Duração</p><p className="font-bold text-white text-sm">{durationMin} min</p></div>
      </div>
      <div className="bg-[#001133] px-4 py-3 space-y-2">
        <div className="flex justify-between text-sm"><span className="text-white/40">Energia consumida</span><span className="font-bold text-white">{fmtKwh(kwh)}</span></div>
        <div className="flex justify-between text-sm"><span className="text-white/40">Tarifa</span><span className="font-bold text-white">{fmtMoney(connector.priceKwh)} / kWh</span></div>
        {discount>0&&<div className="flex justify-between text-sm"><span className="text-[#FF5C00] font-semibold">Desconto cupom</span><span className="font-bold text-[#FF5C00]">− {fmtMoney(discount)}</span></div>}
        <div className="border-t border-[#002266] pt-2 flex justify-between items-center">
          <span className="font-bold text-white/60">Total a pagar</span>
          <span className="font-bold text-2xl text-[#FF5C00]">{fmtMoney(finalCost)}</span>
        </div>
      </div>
      <div className="bg-amber-50 border-t border-amber-100 px-4 py-2 flex items-center gap-2">
        <span className="text-amber-500">🔒</span>
        <p className="text-[11px] text-amber-700 font-semibold">Conector bloqueado · liberado após confirmação do pagamento</p>
      </div>
    </div>
  );

  if(!method){
    return(
      <div className="screen bg-[#001133] fade-in">
        <div className="bg-[#001A4D] text-white pb-6" style={{borderBottom:"1px solid #002266"}}>
          <TopBar title="Pagamento" dark onBack={onBack}/>
          <div className="px-4 relative z-10 -mt-1"><p className="font-extrabold text-xl">Forma de pagamento</p><p className="text-xs text-gray-400 mt-0.5">Conector liberado só após confirmação.</p></div>
        </div>
        <div className="px-4 pt-4 pb-6 space-y-3">
          {billSummary}
          {[
            {id:"pix",icon:"🔑",label:"PIX",sub:"Aprovação instantânea · 0,99% de taxa",badge:"Recomendado",badgeColor:"#e6fff6",badgeText:"#018a69",border:"#FF5C00",action:()=>setMethod("pix"),enabled:true},
            {id:"card",icon:"💳",label:"Cartão de crédito / débito",sub:"Via Mercado Pago · Visa, Master, Elo",badge:"MP",badgeColor:"#009ee3",badgeText:"#fff",border:"#009ee3",action:()=>{setMethod("card");setCardErr(false);setCardOpened(false);},enabled:true},
            {id:"saldo",icon:"💰",label:"Saldo EletroGo",sub:`Disponível: ${fmtMoney(wallet.balance)}`,badge:hasSaldoParcial?"Parcial":(!hasSaldo&&!hasSaldoParcial?"Insuficiente":""),badgeColor:"#fef3c7",badgeText:"#92400e",border:"#8b5cf6",action:()=>(hasSaldo||hasSaldoParcial)&&setMethod("saldo"),enabled:hasSaldo||hasSaldoParcial},
          ].map(m=>(
            <button key={m.id} onClick={m.action} disabled={!m.enabled}
              className="w-full text-left card card-hover flex items-center gap-3 p-4"
              style={{opacity:m.enabled?1:.45,border:`1.5px solid #002266`,transition:"border-color .2s"}}
              onMouseEnter={e=>{if(m.enabled)e.currentTarget.style.borderColor=m.border}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="#eef0f5"}}>
              <div style={{width:46,height:46,borderRadius:14,background:"#001133",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{m.icon}</div>
              <div className="flex-1 min-w-0">
                <p className="font-extrabold text-white text-sm">{m.label}</p>
                <p className="text-[11px] text-gray-400 mt-0.5">{m.sub}</p>
              </div>
              {m.badge&&<span className="badge-pill flex-shrink-0" style={{background:m.badgeColor,color:m.badgeText}}>{m.badge}</span>}
              <span className="text-gray-300 text-base">›</span>
            </button>
          ))}
        </div>
      </div>
    );
  }

  if(method==="pix"){
    return(
      <div className="screen bg-[#001133] fade-in">
        <TopBar title="Pagar com PIX" onBack={()=>{setMethod(null);setPixStatus("idle");setPixSecs(1800);}}/>
        <div className="px-4 pt-2 pb-6">
          {billSummary}
          {pixStatus==="expired"?(
            <div className="flex flex-col items-center py-8 gap-3">
              <div className="w-20 h-20 rounded-full bg-rose-100 flex items-center justify-center text-4xl">⏰</div>
              <p className="font-extrabold text-lg text-rose-600">QR Code expirado</p>
              <p className="text-sm text-gray-500 text-center">O prazo de 30 minutos foi atingido.</p>
              <button onClick={()=>{setPixStatus("idle");setPixSecs(1800);}} className="mt-2 px-6 py-3 rounded-2xl bg-[#FF5C00] text-white font-bold">Gerar novo QR</button>
            </div>
          ):pixStatus==="confirmed"?(
            <div className="flex flex-col items-center py-10 gap-3">
              <div className="w-20 h-20 rounded-full bg-[#FF5C00] flex items-center justify-center text-4xl">✅</div>
              <p className="font-extrabold text-lg text-[#FFAB00]">Pagamento confirmado!</p>
              <p className="text-sm text-gray-500">Liberando o conector…</p>
            </div>
          ):pixStatus==="scanning"?(
            <div className="flex flex-col items-center py-8 gap-4">
              <div className="w-16 h-16 rounded-full border-4 border-[#FF5C00] border-t-transparent animate-spin"></div>
              <p className="font-bold text-white">Aguardando confirmação…</p>
            </div>
          ):(
            <>
              <div className="flex flex-col items-center bg-white rounded-2xl border border-gray-100 p-6 shadow-sm gap-4">
                <div className="flex items-center justify-between w-full">
                  <p className="text-sm font-bold text-[#001133]">Escaneie o QR Code</p>
                  <span className={"text-xs font-bold px-2 py-1 rounded-full "+(pixSecs<300?"bg-rose-100 text-rose-600":"bg-[#FF5C00]/10 text-[#FF5C00]")}>⏱ {fmt(pixSecs)}</span>
                </div>
                <div className="p-3 bg-white rounded-xl border border-gray-200 shadow-sm"><QRMock size={160}/></div>
                <div className="w-full">
                  <p className="text-xs text-gray-400 font-semibold mb-1">Ou copie a chave PIX:</p>
                  <div className="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5">
                    <span className="text-xs text-gray-600 flex-1 truncate font-mono">{PIX_KEY}</span>
                    <button onClick={()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}}
                      className={"text-[11px] font-bold px-2.5 py-1.5 rounded-lg transition "+(copied?"bg-[#FF5C00]/10 text-[#FF5C00]":"bg-gray-200 text-gray-600")}>
                      {copied?"Copiado ✓":"Copiar"}
                    </button>
                  </div>
                </div>
                <div className="w-full text-center">
                  <p className="text-3xl font-extrabold text-[#001133]">{fmtMoney(finalCost)}</p>
                  <p className="text-[11px] text-gray-400 mt-1">Pague exatamente este valor</p>
                </div>
              </div>
              <button onClick={()=>setPixStatus("scanning")} className="w-full mt-4 py-4 rounded-2xl bg-[#FF5C00] text-white font-extrabold shadow-lg shadow-black/30">
                Já paguei — Confirmar
              </button>
              <p className="text-center text-[11px] text-gray-400 mt-2">QR válido por 30 min · expira às {new Date(Date.now()+pixSecs*1000).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}</p>
            </>
          )}
        </div>
      </div>
    );
  }

  if(method==="card"){
    return(
      <div className="screen bg-[#001133] fade-in">
        <TopBar title="Mercado Pago" onBack={()=>{setMethod(null);setCardErr(false);setCardOpened(false);}}/>
        <div className="px-4 pt-2 pb-6">
          {billSummary}
          <div className="bg-[#001A4D] rounded-2xl border border-[#002266] p-6 flex flex-col items-center gap-4">
            <div className="w-16 h-16 rounded-2xl flex items-center justify-center shadow-md" style={{background:"#009ee3"}}><span className="text-white font-extrabold text-xl">MP</span></div>
            {cardErr?(
              <>
                <div className="w-full bg-rose-50 border border-rose-200 rounded-2xl p-4 text-center">
                  <p className="text-2xl mb-1">❌</p>
                  <p className="font-bold text-rose-600">Pagamento não confirmado</p>
                  <p className="text-xs text-rose-500 mt-1">Não identificamos o pagamento. Tente novamente ou use outro método.</p>
                </div>
                <button onClick={()=>{setMethod(null);setCardErr(false);setCardOpened(false);}} className="w-full py-3.5 rounded-2xl bg-[#FF5C00] text-white font-bold">Tentar outro método</button>
                <button onClick={()=>{setCardErr(false);setCardOpened(false);}} className="w-full py-3 rounded-2xl border border-gray-200 text-gray-600 text-sm font-semibold">Tentar novamente</button>
              </>
            ):(
              <>
                <p className="font-extrabold text-white text-lg">Mercado Pago</p>
                <p className="text-sm text-gray-500 text-center leading-snug">Após pagar, volte e clique em <strong>"Já paguei"</strong>.</p>
                <p className="text-3xl font-extrabold text-white">{fmtMoney(finalCost)}</p>
                <a href={MP_PAYMENT_LINK} target="_blank" rel="noopener noreferrer" onClick={()=>setCardOpened(true)}
                  className="w-full py-4 rounded-2xl font-extrabold text-white text-center shadow-lg block"
                  style={{background:"linear-gradient(135deg,#009ee3 0%,#0070b3 100%)"}}>
                  💳 Ir para o Mercado Pago →
                </a>
                {cardOpened&&(
                  <button onClick={()=>onConfirm("card")} className="w-full py-4 rounded-2xl bg-[#FF5C00] text-white font-extrabold shadow-lg shadow-black/30">
                    ✅ Já paguei — Liberar conector
                  </button>
                )}
              </>
            )}
          </div>
          <p className="text-center text-[11px] text-gray-400 mt-3">Ambiente seguro · SSL · Certificado Mercado Pago</p>
        </div>
      </div>
    );
  }

  if(method==="saldo"){
    return(
      <div className="screen bg-[#001133] fade-in">
        <TopBar title="Saldo EletroGo" onBack={()=>setMethod(null)}/>
        <div className="px-4 pt-2 pb-6">
          {billSummary}

                <span className="text-sm font-semibold text-ink">{r.label}</span>
              </div>
              <div className="flex items-center gap-1.5">
                <span className="text-[11px] text-gray-400">{r.value}</span>
                {(r.action||r.href)&&<span className="text-gray-300 text-base">›</span>}
              </div>
            </div>
          ))}
        </div>
        <button onClick={onLogout} className="w-full py-3.5 rounded-2xl text-sm font-bold text-rose-600 card-hover" style={{border:"1.5px solid #fecdd3",background:"#fff9f9"}}>Sair da conta</button>
        <p className="text-center text-[11px] text-gray-300">EletroGo · v1.0 · Curitiba, PR</p>
      </div>
    </div>
  );
}

/* ════════════════════════════
   PLANOS
════════════════════════════ */
function PlansScreen({onBack,userPlan,onSelectPlan}){
  const [selected,setSelected]=useState(userPlan||"free");
  const [confirmed,setConfirmed]=useState(false);
  const handleConfirm=()=>{onSelectPlan(selected);setConfirmed(true);setTimeout(onBack,1200);};
  return(
    <div className="screen bg-[#001133] fade-in">
      <div className="bg-gradient-to-br from-yellow-400 to-yellow-600 text-ink pb-6 rounded-b-[28px] relative overflow-hidden">
        <div className="hidden"></div>
        <TopBar title="EletroPass" onBack={onBack}/>
        <div className="px-4 relative z-10 -mt-1">
          <p className="font-extrabold text-xl">Escolha seu plano</p>
          <p className="text-[12px] opacity-75 mt-0.5">Assinantes têm ARPU 4,6× maior e churn 38% menor.</p>
        </div>
      </div>
      <div className="px-4 pt-4 pb-6 space-y-3">
        {PLANS.map(plan=>{
          const isActive=selected===plan.id;
          const isGold=plan.id==="eletropass-gold";
          return(
            <button key={plan.id} onClick={()=>setSelected(plan.id)}
              className="w-full text-left rounded-2xl transition-all card-hover overflow-hidden"
              style={{border:isActive?"2px solid #FF5C00":"2px solid #002266",boxShadow:isActive?"0 4px 20px rgba(255,92,0,.15)":"0 2px 8px rgba(0,0,0,.4)",background:"#001A4D",position:"relative"}}>
              {isGold&&<div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,#fbbf24,#f59e0b)"}}></div>}
              <div className="p-4">
                <div className="flex items-start justify-between gap-2">
                  <div className="flex items-center gap-2.5">
                    <div style={{width:38,height:38,borderRadius:12,background:isGold?"linear-gradient(135deg,#fbbf24,#f59e0b)":isActive?"linear-gradient(135deg,#FF5C00,#FFAB00)":"#f3f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                      {plan.icon}
                    </div>
                    <div>
                      <p className="font-extrabold text-white text-sm">{plan.label}</p>
                      {plan.highlight&&<span className="badge-pill bg-yellow-100 text-yellow-700">Mais popular</span>}
                    </div>
                  </div>
                  <div className="text-right">
                    {plan.priceMonth===0
                      ?<p className="font-bold text-gray-400 text-sm">Grátis</p>
                      :<><p className="font-extrabold text-white text-lg leading-none">{fmtMoney(plan.priceMonth)}</p><p className="text-[10px] text-gray-400">/mês</p></>
                    }
                  </div>
                </div>
                <div className="mt-3 space-y-1.5">
                  {plan.features.map((f,i)=>(
                    <div key={i} className="flex items-center gap-2">
                      <div style={{width:16,height:16,borderRadius:"50%",background:isActive?"#FF5C00":"#e5e7eb",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <span style={{fontSize:9,fontWeight:800,color:isActive?"#ffffff":"#9ca3af"}}>✓</span>
                      </div>
                      <span className="text-[12px] text-gray-400">{f}</span>
                    </div>
                  ))}
                </div>
                {isActive&&<div style={{marginTop:12,padding:"8px 12px",borderRadius:12,background:"rgba(255,92,0,.08)",border:"1px solid rgba(255,92,0,.25)"}}>
                  <p className="text-[11px] text-[#FF5C00] font-bold text-center">✓ Plano selecionado</p>
                </div>}
              </div>
            </button>
          );
        })}
        {confirmed?(
          <div className="py-4 text-center text-[#FFAB00] font-bold text-sm">✅ Plano atualizado com sucesso!</div>
        ):(
          <button onClick={handleConfirm} className="w-full py-4 rounded-2xl bg-[#FF5C00] text-white font-extrabold shadow-lg shadow-black/30">
            {selected==="free"?"Continuar grátis":`Assinar ${PLANS.find(p=>p.id===selected)?.label}`}
          </button>
        )}
        <p className="text-center text-[10px] text-gray-400">Cobrança mensal · Cancele quando quiser</p>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   APP PRINCIPAL
════════════════════════════════════════ */
function App(){
  const [lgpdDone,setLgpdDone]   = useState(()=>!!localStorage.getItem(SK_LGPD));
  const [onboarded,setOnboarded] = useState(()=>!!localStorage.getItem(SK_ONBOARD));
  const [user,setUser]           = useState(null);
  const [authLoading,setAuthLoading] = useState(SB_READY); // true only when Supabase configured
  const [screen,setScreen]       = useState("home");
  const [selectedStation,setSelectedStation] = useState(null);
  const [stations,setStations]   = useState(STATIONS);
  const [session,setSession]     = useState(null);

  /* ── Carrega estações do Supabase (preços/status em tempo real) ── */
  useEffect(()=>{
    sbLoadStations().then(data=>{
      if(data&&data.length) setStations(data);
    });
  },[]);
  const [completedSession,setCompletedSession] = useState(null);
  const [pendingReceipt,setPendingReceipt]     = useState(null);
  const [history,setHistory]     = useState([]);
  const [wallet,setWallet]       = useState(()=>{try{return JSON.parse(localStorage.getItem(SK_WALLET))||{balance:0,points:0,coupons:INITIAL_COUPONS};}catch{return {balance:0,points:0,coupons:INITIAL_COUPONS};}});
  const [userPlan,setUserPlan]   = useState("free");
  const [notifs,setNotifs]       = useState(INITIAL_NOTIFS);
  const [showNotifs,setShowNotifs] = useState(false);
  const [toast,setToast]         = useState(null);
  const [reservations,setReservations] = useState({});
  const tickRef = useRef(null);
  const resTimers = useRef({});

  /* ── Supabase: carregar dados do usuário do banco ── */
  const loadUserDB = async(userId)=>{
    const data = await sbLoadUserData(userId);
    if(!data) return;
    if(data.wallet){
      setWallet({
        balance: parseFloat(data.wallet.balance)||0,
        points: data.wallet.points||0,
        coupons: data.wallet.coupons||INITIAL_COUPONS,
      });
    }
    if(data.sessions?.length){
      setHistory(data.sessions.map(s=>({
        id:s.id, stationName:s.station_name, date:new Date(s.created_at).toLocaleDateString("pt-BR"),
        kwh:parseFloat(s.kwh)||0, durationMin:s.duration_min||0,
        cost:parseFloat(s.cost)||0, discount:parseFloat(s.discount)||0,
        cashback:parseFloat(s.cashback)||0, paymentMethod:s.payment_method,
      })));
    } else {
      // Tenta cache local com escopo por usuário
      try{
        const cached=JSON.parse(localStorage.getItem(SK_HISTORY+"_"+userId));
        if(cached?.length) setHistory(cached);
        else setHistory([]);
      } catch{ setHistory([]); }
    }
  };

  /* ── Supabase: escutar mudança de sessão de auth ── */
  useEffect(()=>{
    if(!SB_READY){
      // Sem Supabase: usar localStorage como fallback (histórico com escopo por usuário)
      try{
        const u=JSON.parse(localStorage.getItem(SK_USER));
        if(u){
          setUser(u);
          const cached=JSON.parse(localStorage.getItem(SK_HISTORY+"_"+u.id));
          setHistory(cached?.length?cached:[]);
        }
      }catch{}
      return;
    }
    SbAuth.getSession().then(session=>{
      if(session?.user){
        const u={id:session.user.id,name:session.user.user_metadata?.name||session.user.email.split("@")[0],email:session.user.email};
        setUser(u);
        loadUserDB(u.id);
      }
      setAuthLoading(false);
    });
    const unsub=SbAuth.onAuthChange((event,session)=>{
      if(event==="SIGNED_IN"&&session?.user){
        const u={id:session.user.id,name:session.user.user_metadata?.name||session.user.email.split("@")[0],email:session.user.email};
        setUser(u);loadUserDB(u.id);
      } else if(event==="SIGNED_OUT"){
        setUser(null);
        setWallet({balance:0,points:0,coupons:INITIAL_COUPONS});
        setHistory([]);
      }
    });
    return unsub;
  },[]);

  /* ── Sync wallet → Supabase (debounced) ── */
  const walletSyncTimer=useRef(null);
  useEffect(()=>{
    if(!user?.id) return;
    localStorage.setItem(SK_WALLET,JSON.stringify(wallet));
    clearTimeout(walletSyncTimer.current);
    walletSyncTimer.current=setTimeout(()=>sbUpsertWallet(user.id,wallet),1500);
  },[wallet]);

  useEffect(()=>{
    if(user?.id) localStorage.setItem(SK_HISTORY+"_"+user.id,JSON.stringify(history));
  },[history,user?.id]);

  /* ── Tick de carga em tempo real (DEMO_FACTOR removido) ── */
  useEffect(()=>{
    if(!session)return;
    tickRef.current=setInterval(()=>{
      setSession(prev=>{
        if(!prev)return prev;
        const inc=prev.connector.powerKw/3600; // kWh por segundo real
        return{...prev,kwh:prev.kwh+inc,elapsedSec:prev.elapsedSec+1};
      });
    },1000);
    return()=>clearInterval(tickRef.current);
  },[session&&session.id]);

  useEffect(()=>()=>Object.values(resTimers.current).forEach(clearInterval),[]);

  const handleLGPD=()=>{localStorage.setItem(SK_LGPD,"1");setLgpdDone(true);};
  const handleOnboarded=()=>{localStorage.setItem(SK_ONBOARD,"1");setOnboarded(true);};
  const handleLogin=(userData)=>{
    const u=typeof userData==="string"?{name:userData.split("@")[0],email:userData,isNew:false}:userData;
    if(!SB_READY) localStorage.setItem(SK_USER,JSON.stringify(u));
    setUser(u);
    if(u.isNew)showToast("🎉 Bem-vindo à EletroGo, "+u.name+"!");
    setScreen("home");
  };

  const showToast=(msg)=>setToast(msg);
  const handleSelectPlan=(planId)=>setUserPlan(planId);

  const handleStartCharge=(station,connector)=>{
    const activeCoupon=wallet.coupons.find(c=>c.active&&!c.used);
    setStations(prev=>prev.map(s=>s.id===station.id?{...s,connectors:s.connectors.map(c=>c.id===connector.id?{...c,status:"carregando"}:c)}:s));
    setSession({id:"TX-"+Math.floor(1000+Math.random()*9000),station,connector,kwh:0,elapsedSec:0,appliedCouponId:activeCoupon?.id||null});
    setScreen("charging");
  };

  const handleStopCharge=()=>{
    if(!session)return;
    clearInterval(tickRef.current);
    const {station,connector,kwh,elapsedSec,appliedCouponId}=session;
    const rawCost=kwh*connector.priceKwh;
    const coupon=wallet.coupons.find(c=>c.id===appliedCouponId);
    let discount=0;
    if(coupon&&coupon.type==="percent")discount=rawCost*(coupon.value/100);
    const finalCost=Math.max(0,rawCost-discount);
    const tier=getTier(wallet.points);
    const tierCashback=finalCost*tier.cashbackRate;
    const earnedPoints=Math.round(finalCost);
    setCompletedSession({id:session.id,station,connector,kwh,elapsedSec,appliedCouponId,rawCost,discount,finalCost,tierCashback,earnedPoints});
    setSession(null);
    setScreen("payment");
  };

  const handlePaymentComplete=(paymentMethod)=>{
    if(!completedSession)return;
    const {id,station,connector,kwh,elapsedSec,appliedCouponId,finalCost,discount,tierCashback,earnedPoints}=completedSession;
    const durationMin=Math.max(1,Math.round(elapsedSec/60));
    setStations(prev=>prev.map(s=>s.id===station.id?{...s,connectors:s.connectors.map(c=>c.id===connector.id?{...c,status:"disponivel"}:c)}:s));
    const histEntry={id,stationName:station.name,date:new Date().toLocaleDateString("pt-BR"),kwh,durationMin,cost:finalCost,discount,cashback:tierCashback,paymentMethod};
    setHistory(prev=>[histEntry,...prev]);
    // Persistir sessão no Supabase
    if(user?.id) sbAddSession(user.id,{
      station_name:station.name, kwh, duration_min:durationMin,
      cost:finalCost, discount, cashback:tierCashback, payment_method:paymentMethod,
    });
    setWallet(prev=>{
      let coupons=prev.coupons.map(c=>c.id===appliedCouponId?{...c,used:true,active:false}:c);
      let balance=prev.balance+tierCashback;
      let points=prev.points+earnedPoints;
      const cbCoupon=prev.coupons.find(c=>c.type==="cashback"&&!c.used&&kwh>=(c.minKwh||0));
      if(cbCoupon&&!appliedCouponId){balance+=cbCoupon.value;coupons=coupons.map(c=>c.id===cbCoupon.id?{...c,used:true}:c);}
      return{...prev,coupons,balance,points};
    });
    setPendingReceipt({id,stationName:station.name,connectorType:connector.type,kwh,durationMin,priceKwh:connector.priceKwh,cost:finalCost,discount,cashback:tierCashback,paymentMethod});
    setCompletedSession(null);
    setScreen("receipt");
  };

  const handleToggleCoupon=(couponId)=>{
    setWallet(prev=>({...prev,coupons:prev.coupons.map(c=>{
      if(c.used)return c;
      if(c.id===couponId)return{...c,active:!c.active};
      return{...c,active:false};
    })}));
  };

  const handleLogout=async()=>{
    await SbAuth.logout();
    localStorage.removeItem(SK_USER);
    setUser(null);setScreen("home");setSelectedStation(null);setSession(null);
    setWallet({balance:0,points:0,coupons:INITIAL_COUPONS});
    setHistory([]);
  };

  const handleReserve=(station,connector)=>{
    const key=station.id+"-"+connector.id;
    setStations(prev=>prev.map(s=>s.id===station.id?{...s,connectors:s.connectors.map(c=>c.id===connector.id?{...c,status:"reservado"}:c)}:s));
    setReservations(prev=>({...prev,[key]:{secsLeft:900}}));
    showToast("⏱ Conector reservado por 15 minutos!");
    resTimers.current[key]=setInterval(()=>{
      setReservations(prev=>{
        const cur=(prev[key]?.secsLeft||0)-1;
        if(cur<=0){
          clearInterval(resTimers.current[key]);
          setStations(s=>s.map(st=>st.id===station.id?{...st,connectors:st.connectors.map(c=>c.id===connector.id?{...c,status:"disponivel"}:c)}:st));
          const{[key]:_,...rest}=prev;return rest;
        }
        return{...prev,[key]:{secsLeft:cur}};
      });
    },1000);
  };

  const handleReadNotif=(id)=>setNotifs(prev=>prev.map(n=>n.id===id?{...n,read:true}:n));
  const unreadCount=notifs.filter(n=>!n.read).length;

  if(authLoading) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",background:"#001133",gap:16}}>
      <div style={{width:48,height:48,border:"3px solid #1e3a5f",borderTop:"3px solid #FF5C00",borderRadius:"50%",animation:"spin 0.9s linear infinite"}}/>
      <p style={{color:"#8899aa",fontSize:13,letterSpacing:1}}>Carregando...</p>
    </div>
  );
  if(!lgpdDone)  return <LGPDScreen onAccept={handleLGPD}/>;
  if(!onboarded) return <OnboardingScreen onDone={handleOnboarded}/>;
  if(!user)      return <AuthScreen onLogin={handleLogin}/>;

  let content;
  switch(screen){
    case "home":
      content=<HomeScreen user={user} stations={stations} onSelectStation={s=>{setSelectedStation(s);setScreen("station");}} wallet={wallet} onGoWallet={()=>setScreen("wallet")} onOpenNotifs={()=>setShowNotifs(true)} unreadCount={unreadCount}/>;
      break;
    case "station":
      content=<StationDetailScreen station={selectedStation} onBack={()=>setScreen("home")} onStartCharge={handleStartCharge} onReserve={handleReserve} wallet={wallet} userPlan={userPlan} reservations={reservations}/>;
      break;
    case "charging":
      content=<ChargingScreen session={session} onStop={handleStopCharge} onBack={()=>setScreen("home")} wallet={wallet}/>;
      break;
    case "payment":
      content=completedSession?<PaymentScreen completedSession={completedSession} wallet={wallet} onConfirm={handlePaymentComplete} onBack={()=>setScreen("home")}/>:null;
      break;
    case "receipt":
      content=pendingReceipt?<ReceiptScreen receipt={pendingReceipt} onDone={()=>{setPendingReceipt(null);setScreen("history");}}/>:null;
      break;
    case "wallet":
      content=<WalletScreen wallet={wallet} onToggleCoupon={handleToggleCoupon} userPlan={userPlan} onGoPlans={()=>setScreen("plans")} onBack={()=>setScreen("home")}/>;
      break;
    case "history":
      content=<HistoryScreen history={history} onBack={()=>setScreen("home")}/>;
      break;
    case "profile":
      content=<ProfileScreen user={user} onLogout={handleLogout} wallet={wallet} userPlan={userPlan} onGoPlans={()=>setScreen("plans")} onBack={()=>setScreen("home")}/>;
      break;
    case "plans":
      content=<PlansScreen onBack={()=>setScreen("wallet")} userPlan={userPlan} onSelectPlan={handleSelectPlan}/>;
      break;
    default:
      content=<HomeScreen user={user} stations={stations} onSelectStation={s=>{setSelectedStation(s);setScreen("station");}} wallet={wallet} onGoWallet={()=>setScreen("wallet")} onOpenNotifs={()=>setShowNotifs(true)} unreadCount={unreadCount}/>;
  }

  return(
    <div className="flex flex-col h-full relative">
      {content}
      {screen!=="payment"&&screen!=="receipt"&&<BottomNav screen={screen} setScreen={setScreen} hasActiveSession={!!session}/>}
      {showNotifs&&<NotifPanel notifs={notifs} onRead={handleReadNotif} onClose={()=>setShowNotifs(false)}/>}
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      <SupportButton/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
